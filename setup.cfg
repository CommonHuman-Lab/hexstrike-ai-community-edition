# Flake8 configuration for HexStrike AI
# Tuned to catch real bugs without flooding false positives
# Based on skills/senior-engineering/clean-code and code-review-checklist standards

[flake8]
max-line-length = 120
max-complexity = 15

# Focus on real bugs, skip style noise for a pentest framework
extend-ignore =
    # E501: line too long — handled by black formatter
    E501,
    # W503: line break before binary operator — black handles this
    W503,
    # E402: module level import not at top — some files use conditional imports
    E402,
    # E741: ambiguous variable name — tools use short vars like 'e' in except
    E741

# Skip generated/cached files
exclude =
    .git,
    __pycache__,
    bin,
    hexstrike-env,
    .eggs,
    *.egg

# Per-file ignores for specific patterns
per-file-ignores =
    # hexstrike_mcp.py: many tool functions, decorative f-strings, complexity
    hexstrike_mcp.py:E302,E303,F541,F841,E722,C901
    # __init__.py files have unused imports for re-export
    __init__.py:F401
    # hexstrike_server.py: star imports for 113 tool classes — by design
    hexstrike_server.py:F405,F403
    # Agents: complex AI logic, decorative f-strings
    agents/*:C901,F541
    # API routes: decorative f-strings, complexity
    api/routes/*:F541,C901
    # Core modules: complexity, decorative f-strings, whitespace (black conflict)
    core/*:C901,F541,E203
    # Test files: unused imports (fixtures, typing) and unused vars
    tests/*:F401,F841
    # Tool wrappers: complexity, bare excepts (error recovery), unused vars, f-strings
    tools/*:C901,E722,F841,F541,F401
