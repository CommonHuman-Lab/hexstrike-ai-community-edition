name: ssh_client
version: "1.0.0"
description: "SSH metadata + execution-request plugin. Returns structured SSH execution requests."
author: "system"
category: network
tags:
  - ssh
  - network
  - remote
  - command

endpoint: /api/plugins/ssh
mcp_tool_name: ssh
effectiveness: 0.55

check:
  type: which
  binary: ssh
  install: "Install OpenSSH client: apt install openssh-client"

params:
  host:
    required: true
    description: "Target host to connect to"

optional:
  port:
    default: 22
    description: "SSH port"

  username:
    default: ""
    description: "SSH username"

  command:
    default: ""
    description: "Command to request execution on the remote host"
