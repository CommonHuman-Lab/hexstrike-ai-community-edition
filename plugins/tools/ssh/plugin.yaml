name: ssh
description: |
  Execute commands on a remote machine via SSH.
  Automatically manages persistent sessions per host.

  - Connects automatically if no session exists
  - Reuses session for faster execution
  - Supports disconnecting sessions

parameters:
  type: object
  properties:
    host:
      type: string
      description: Target host (IP or hostname)

    port:
      type: integer
      description: SSH port (default 22)
      default: 22

    username:
      type: string
      description: SSH username

    password:
      type: string
      description: SSH password (optional if using key-based auth)

    command:
      type: string
      description: Command to execute on the remote host

    disconnect:
      type: boolean
      description: Whether to close the existing SSH session
      default: false

  required:
    - host